<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK Team</title>

    <!-- МЕТАТЕГИ ДЛЯ СОЦСЕТЕЙ (Discord, TG, VK) -->
    <meta property="og:title" content="TCK Team | Official Website">
    <meta property="og:description" content="Официальный сайт киберспортивной команды TCK Team. Составы, матчи и соцсети.">
    <meta property="og:image" content="Logowebsite.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- ИКОНКА НА ВКЛАДКЕ БРАУЗЕРА -->
    <link rel="icon" type="image/png" href="Logo_TCK.png">

    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <script src="lang.js"></script>
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000; color: white; 
            font-family: 'Roboto', sans-serif; 
            display: flex; flex-direction: column; 
            overflow: hidden; position: relative;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            height: 60px; background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box;
            z-index: 100;
            border-bottom: 2px solid #FF0000;
            box-shadow: 0 5px 20px rgba(255, 0, 0, 0.5);
        }

        .top-left { display: flex; align-items: center; gap: 15px; }
        .top-logo { 
            width: 35px; height: 35px; border-radius: 50%; border: 1px solid #FF0000; 
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3); overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        .top-logo img { width: 100%; height: 100%; object-fit: cover; }
        .top-nickname { font-weight: 900; color: #0000FF; letter-spacing: 1px; text-transform: uppercase; font-size: 16px; }

        .top-stats { display: flex; gap: 20px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 18px; font-weight: 900; color: #0000FF; line-height: 1; }
        .stat-value1 { display: block; font-size: 18px; font-weight: 900; color: #FF0000; line-height: 1; }
        .stat-label { font-size: 8px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.3; filter: blur(5px);
            z-index: 1; transform: scale(1.1); pointer-events: none;
        }

        .content { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            z-index: 10; position: relative;
        }

        .main-title { text-align: center; text-transform: uppercase; line-height: 0.85; user-select: none; }
        .main-title span { display: block; font-size: clamp(50px, 12vw, 120px); letter-spacing: -2px; }
		
		.teks1 { color: #002aff; }
        .highlight { color: #ff0000; text-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }

        .gif-container { margin-top: 20px; width: 150px; height: 150px; cursor: pointer; transition: 0.3s; }
        .gif-container img { width: 100%; height: 100%; object-fit: contain; }

        /* БЕГУЩАЯ СТРОКА СО СВЕЧЕНИЕМ */
        .marquee-container { 
            width: 100%; background: rgba(255, 0, 0, 0.1); 
            border-top: 1px solid rgba(255, 0, 0, 0.3); 
            color: #ff0000; padding: 8px 0; font-size: 14px; 
            font-weight: 900; text-transform: uppercase; z-index: 20; 
            text-shadow: 0 0 5px #ff0000, 0 0 5px rgba(255, 0, 0, 0.8);
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-nav { 
            display: flex; width: 100%; 
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px); z-index: 20; 
        }

        .nav-item { 
            flex: 1; padding: 25px 0; text-align: center; color: #888; 
            text-transform: uppercase; font-size: 12px; letter-spacing: 1px; 
            transition: 0.4s; cursor: pointer; background: none; border: none; 
            font-weight: 700; border-right: 1px solid rgba(255,255,255,0.05); 
            position: relative; overflow: hidden; 
        }

        .nav-item:last-child { border-right: none; }

        .nav-item::after {
            content: ''; position: absolute; bottom: 0; left: 50%;
            width: 0; height: 3px; background: #ff0000;
            box-shadow: 0 0 15px #ff0000, 0 0 5px #ff0000;
            transition: 0.4s ease; transform: translateX(-50%);
        }

        .nav-item:hover { 
            color: #ff0000; 
            background: rgba(255, 0, 0, 0.05);
            text-shadow: 0 0 10px #ff0000, 0 0 20px rgba(255, 0, 0, 0.6);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .lang-switch { position: absolute; top: 75px; right: 15px; z-index: 30; display: flex; }
        .lang-btn { background: rgba(0, 0, 0, 0.5); border: 1px solid #444; color: #777; padding: 5px 10px; cursor: pointer; margin-left: 5px; border-radius: 2px; font-size: 11px; }
        .lang-btn:hover { color: #fff; border-color: #ff0000; }

        @media (max-width: 600px) {
            .top-bar { padding: 0 15px; height: 50px; }
            .top-nickname { font-size: 12px; }
            .top-logo { width: 28px; height: 28px; }
            .nav-item { padding: 20px 0; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-left">
            <div class="top-logo"><img src="Logo_TCK.png" alt="Logo"></div> 
            <div class="top-nickname">TCK Team</div>
        </div>
        <div class="top-stats">
            <div class="stat-item"><span class="stat-value">?</span><span class="stat-label" data-lang="statWins">Wins</span></div>
            <div class="stat-item"><span class="stat-value1">?</span><span class="stat-label" data-lang="statLosses">Losses</span></div>
            <div class="stat-item"><span class="stat-value">?</span><span class="stat-label" data-lang="statMatches">Matches</span></div>
        </div>
    </div>

    <img src="Cs.jpg" class="bg-image" alt="Background">

    <div class="lang-switch">
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" onclick="changeLang('ru')">RU</button>
        <button class="lang-btn" onclick="changeLang('ua')">UA</button>
    </div>

    <div class="content">
        <h1 class="main-title">
            <span class="teks1" data-lang="titlePart1">TCK</span>
            <span class="highlight" data-lang="titlePart2">Team</span>
        </h1>
        <div class="gif-container" onmouseenter="this.querySelector('img').src='https://media.tenor.com/gmbMn1iUZxgAAAAi/cat-%D0%BA%D0%BE%D1%82.gif'" onmouseleave="this.querySelector('img').src='cat_static.png'">
            <img src="cat_static.png" alt="Cat Logo">
        </div>
    </div>

    <div class="marquee-container">
        <marquee scrollamount="25" data-lang="runningText">Loading information...</marquee>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="window.location.href='sostav/'" data-lang="menuSostav">Составы</button>
        <button class="nav-item" onclick="window.location.href='matches/'" data-lang="menuMatches">Матчи</button>
        <button class="nav-item" onclick="window.location.href='social/'" data-lang="menuSocial">Соцсети</button>
    </nav>

    <script>
        function changeLang(lang) {
            localStorage.setItem('preferredLang', lang);
            if (typeof updateLanguage === 'function') { updateLanguage(); }
            document.documentElement.lang = lang;
        }
        window.onload = function() {
            let savedLang = localStorage.getItem('preferredLang') || 'en';
            changeLang(savedLang);
        };
    </script>
</body>
</html>
