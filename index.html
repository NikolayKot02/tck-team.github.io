<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK-team</title>
    <!-- Подключение шрифта -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .lang-switch {
            margin-bottom: 20px;
        }
        button {
            cursor: pointer;
            padding: 8px 15px;
            font-family: 'Roboto', sans-serif;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
        }
        .sostav-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 12px 25px;
            background-color: #24292e;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .links {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ru')">RU</button>
    </div>

    <h1 id="title" data-key="title">It's website tck-team in cs</h1>
    
    <img src="Cs.jpeg" alt="Cs" width="900">

    <br>

    <!-- Кнопка перехода на состав -->
    <button class="sostav-btn" data-key="btnSostav" onclick="window.location.href='sostav/'">
        View Team Roster
    </button>

    <div class="links">
        <p id="useful-links" data-key="usefulLinks">Useful links:</p>
        <ul>
            <li><a href="https://steamcommunity.com" target="_blank">Steam Profile</a></li>
            <li><a href="https://github.com" target="_blank">Our GitHub</a></li>
        </ul>
    </div>
    
    <script>
        // Проверка на мобильное устройство (перенаправление)
        function checkDevice() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            if (isMobile) {
                window.location.href = 'telephone/';
            }
        }

        const translations = {
            ru: {
                title: "Это сайт tck-team в CS",
                usefulLinks: "Полезные ссылки:",
                btnSostav: "Посмотреть состав команды"
            },
            en: {
                title: "It's website tck-team in cs",
                usefulLinks: "Useful links:",
                btnSostav: "View Team Roster"
            }
        };

        function changeLang(lang) {
            const elements = document.querySelectorAll('[data-key]');
            elements.forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
            document.documentElement.lang = lang;
            localStorage.setItem('preferredLang', lang);
        }

        window.onload = function() {
            // 1. Сначала проверяем устройство
            checkDevice();

            // 2. Затем настраиваем язык
            let savedLang = localStorage.getItem('preferredLang');
            if (!savedLang) {
                savedLang = navigator.language.startsWith('ru') ? 'ru' : 'en';
            }
            changeLang(savedLang);
        };
    </script>
</body>
</html>
