<!DOCTYPE html>
<html>
<head>
    <title>TCK-team</title>
    <!-- Подключение шрифта -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            padding: 20px;
            background-color: #f4f4f4; /* Немного фона для стиля */
        }
        .lang-switch {
            margin-bottom: 20px;
        }
        .links {
            margin-top: 20px;
        }
        button {
            cursor: pointer;
            padding: 8px 20px;
            font-family: 'Roboto', sans-serif;
            border: 1px solid #ccc;
            background: white;
            border-radius: 5px;
        }
        button:hover {
            background: #eee;
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ru')">RU</button>
    </div>

    <h1 id="title">It's website tck-team in cs</h1>
    
    <img src="Cs.jpeg" alt="Cs" width="900">

    <div class="links">
        <p id="useful-links">Useful links:</p>
        <ul>
        </ul>
    </div>
    
    <script>
        function changeLang(lang) {
            const title = document.getElementById('title');
            const linksTitle = document.getElementById('useful-links');

            if (lang === 'ru') {
                title.textContent = "Это сайт tck-team в CS";
                linksTitle.textContent = "Полезные ссылки:";
                document.documentElement.lang = "ru"; // Меняем атрибут языка в HTML
            } else {
                title.textContent = "It's website tck-team in cs";
                linksTitle.textContent = "Useful links:";
                document.documentElement.lang = "en";
            }
        }

        // АВТООПРЕДЕЛЕНИЕ ЯЗЫКА
        window.onload = function() {
            // Получаем код языка браузера (например, "ru-RU" или "en-US")
            const userLang = navigator.language || navigator.userLanguage; 
            
            if (userLang.startsWith('ru')) {
                changeLang('ru');
            } else {
                changeLang('en');
            }
            
            console.log('Detected language:', userLang);
        };
        
        console.log('Hello from GitHub!');
    </script>
</body>
</html>
