<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- ИСПРАВЛЕНО: Добавлен viewport для корректного масштаба на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK-team | Thank</title>

    <link rel="icon" type="image/png" href="../Logo_TCK.png">
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    
    <style>
        body { font-family: 'Roboto', sans-serif; padding: 40px; background-color: #0a0a0a; color: white; margin: 0; box-sizing: border-box; }
        
        .thank-title { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 50px; font-size: 48px; text-align: left; color: #FF0000; }
        
        .roster-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; /* Центрируем карточки на мобилках */
            gap: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .chell-card { background-color: #111; border: 1px solid #333; width: 200px; padding: 10px; text-align: left; transition: 0.3s; cursor: pointer; }
        .chell-card:hover { transform: translateY(-5px); border-color: #FF0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 0, 0, 0.2); }
        .chell-card:hover .chell-name2 { color: #FF0000; }

        .chell-card.blue-hover:hover { border-color: #002aff; box-shadow: 0 0 20px rgba(0, 42, 255, 0.6), inset 0 0 10px rgba(0, 42, 255, 0.2); }
        .chell-card.blue-hover:hover .chell-name { color: #002aff; }

        .chell-photo { width: 100%; height: 250px; background-color: #222; margin-bottom: 15px; overflow: hidden; }
        .chell-photo img { width: 100%; height: 100%; object-fit: cover; }
        
        .chell-role { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; border-left: 2px solid #ff0000; padding-left: 5px; transition: 0.3s; }
        .chell-role2 { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; border-left: 2px solid #002aff; padding-left: 5px; transition: 0.3s; }

        .chell-name { font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 5px 0; transition: 0.3s; }
        .chell-name2 { font-size: 16px; font-weight: 900; text-transform: uppercase; margin: 5px 0; transition: 0.3s; }
        .chell-country { font-size: 12px; color: #666; text-align: right; margin-top: -20px; }

        /* Кнопка назад */
        .back-btn { position: fixed; bottom: 20px; left: 20px; z-index: 1001; color: #555; text-decoration: none; border: 1px solid #333; padding: 10px 30px; border-radius: 2px; text-transform: uppercase; font-size: 14px; transition: 0.3s; background: #0a0a0a; }
        .back-btn:hover { color: #FF0000; border-color: #FF0000; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); justify-content: center; align-items: center; transition: 0.4s ease; }
        .modal.active { background: rgba(0,0,0,0.9); }

        .modal-content { 
            background: #111; border: 1px solid #FF0000; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); 
            max-width: 800px; width: 90%; display: flex; position: relative; 
            transform: translateY(-100vh); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1); 
        }
        .modal.active .modal-content { transform: translateY(0); }
        .modal.closing .modal-content { transform: translateY(100vh); }
        .modal.is-blue .modal-content { border-color: #002aff; box-shadow: 0 0 30px rgba(0, 42, 255, 0.5); }
        .modal.is-blue .modal-name { color: #002aff; }

        .modal-name { color: #FF0000; font-size: 42px; font-weight: 900; margin: 0 0 10px 0; text-transform: uppercase; }
        .modal-img-container { width: 40%; }
        .modal-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .modal-text-container { width: 60%; padding: 40px; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #555; font-size: 28px; z-index: 10; }
        .modal-info { color: #ccc; line-height: 1.6; }

        /* АДАПТИВНОСТЬ ДЛЯ ТЕЛЕФОНОВ */
        @media (max-width: 768px) {
            body { padding: 20px; padding-bottom: 100px; }
            .sostav-title { font-size: 32px; text-align: center; margin-bottom: 30px; }
            
            .player-card { width: 45%; } /* Две карточки в ряд на средних экранах */
            
            .modal-content { flex-direction: column; overflow-y: auto; max-height: 90vh; }
            .modal-img-container, .modal-text-container { width: 100%; }
            .modal-img-container { height: 250px; }
            .modal-text-container { padding: 20px; }
            .modal-name { font-size: 28px; }

            .back-btn { 
                left: 10px; right: 10px; bottom: 10px; 
                text-align: center; padding: 15px; 
                background: rgba(10, 10, 10, 0.95);
            }
        }

        @media (max-width: 480px) {
            .chell-card { width: 100%; max-width: 280px; } /* Одна карточка в ряд на маленьких телефонах */
        }
    </style>
</head>
<body>

    <h1 class="thank-title" data-lang="thankTitle">Thank</h1>

    <div class="roster-container">
        <div class="chell-card" onclick="showInfo('N1kolayKot', 'chell_1_info', 'N1kolayKot.png', false)">
            <div class="chell-role">Create website</div>
            <div class="chell-photo"><img src="N1kolayKot.png"></div>
            <div class="chell-name2">N1kolayKot</div>
            <div class="chell-country">UA</div>
        </div>

        <div class="chell-card blue-hover" onclick="showInfo('s1rota', 'chell_2_info', '', true)">
            <div class="chell-role2">Manager</div>
            <div class="chell-photo"><img src="sas.png"></div>
            <div class="chell-name">s1rota</div>
            <div class="chell-country">UA</div>
        </div>
    </div>

    <div id="infoModal" class="modal" onclick="closeInfo()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeInfo()">&times;</span>
            <div class="modal-img-container"><img id="modalImg" src=""></div>
            <div class="modal-text-container">
                <h2 id="infoName" class="modal-name"></h2>
                <p id="infoText" class="modal-info"></p>
            </div>
        </div>
    </div>
    
    <a href="../" class="back-btn" data-lang="backBtn">← Back to Main</a>

    <script src="../lang.js"></script>
    <script>
        function showInfo(name, infoKey, imgPath, isBlue) {
            const modal = document.getElementById('infoModal');
            document.getElementById('infoName').innerText = name;
            document.getElementById('infoText').innerText = typeof getTranslation === "function" ? getTranslation(infoKey) : infoKey;
            document.getElementById('modalImg').src = imgPath || '';
            
            if (isBlue) modal.classList.add('is-blue');
            else modal.classList.remove('is-blue');

            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('active'); }, 10);
        }

        function closeInfo() { 
            const modal = document.getElementById('infoModal');
            modal.classList.remove('active');
            modal.classList.add('closing');
            setTimeout(() => {
                modal.style.display = 'none';
                modal.classList.remove('closing');
            }, 500);
        }
        
        window.onkeydown = (e) => { if (e.key === "Escape") closeInfo(); };
        window.onload = function() { if (typeof updateLanguage === "function") updateLanguage(); };
    </script>
</body>
</html>
