<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK Team | Match History</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .header {
            color: #FF0000;
            font-size: 36px;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 40px;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            width: 100%; /* Растягиваем на всю ширину */
        }

        .match-item {
            display: flex;
            justify-content: space-between; /* Команды слева, счет справа */
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }

        .teams-box {
            display: flex;
            align-items: center;
        }

        .our-team {
            font-weight: 900;
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
        }

        .vs {
            width: 40px;
            text-align: center;
            font-size: 11px;
            color: #444;
            text-transform: lowercase;
        }

        .enemy-team {
            font-weight: 900;
            color: #666;
            font-size: 18px;
            text-transform: uppercase;
        }

        .score {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-align: right;
            padding-right: 10px; /* Небольшой отступ от края */
        }

        .win { color: #00ff00; }
        .lose { color: #ff0000; }

        .back-btn {
            margin-top: 50px;
            display: inline-block;
            color: #333;
            text-decoration: none;
            border: 1px solid #222;
            padding: 8px 20px;
            text-transform: uppercase;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="header">Match History</div>

    <div class="match-list">
        
        <div class="match-item">
            <div class="teams-box">
                <span class="our-team">TCK</span>
                <span class="vs">vs</span>
                <span class="enemy-team">??</span>
            </div>
            <div class="score win">?:?</div>
        </div>

        <div class="match-item">
            <div class="teams-box">
                <span class="our-team">TCK</span>
                <span class="vs">vs</span>
                <span class="enemy-team">??</span>
            </div>
            <div class="score lose">?:?</div>
        </div>

    </div>

    <a href="../" class="back-btn">← Back to Main</a>

</body>
</html>
