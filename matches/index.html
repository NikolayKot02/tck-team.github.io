<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK Team | Match History</title>
    <!-- Исправил ссылку на шрифт -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="icon" type="image/png" href="../Logo_TCK.png">
    
    <!-- Подключаем скрипт перевода -->
    <script src="../lang.js"></script>

    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .header {
            color: #FF0000;
            font-size: 36px;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 40px;
        }

        .match-list {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .match-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #111;
        }

        .teams-box {
            display: flex;
            align-items: center;
        }

        .our-team {
            font-weight: 900;
            color: #ffffff;
            font-size: 18px;
            text-transform: uppercase;
        }

        .vs {
            width: 40px;
            text-align: center;
            font-size: 11px;
            color: #444;
            text-transform: lowercase;
        }

        .enemy-team {
            font-weight: 900;
            color: #666;
            font-size: 18px;
            text-transform: uppercase;
        }

        .score {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            text-align: right;
            padding-right: 10px;
        }

        .win { color: #00ff00; }
        .lose { color: #ff0000; }

        /* Кнопка выхода в углу */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1001;
            display: inline-block;
            color: #333;
            text-decoration: none;
            border: 1px solid #222;
            padding: 10px 30px;
            text-transform: uppercase;
            font-size: 11px;
            background: #000;
            transition: 0.3s;
        }
        .back-btn:hover { color: #FF0000; border-color: #FF0000; }
    </style>
</head>
<body>

    <div class="header" data-lang="menuMatches">Match History</div>

    <div class="match-list">
        <!-- Пример матча 1 -->
        <div class="match-item">
            <div class="teams-box">
                <span class="our-team">TCK</span>
                <span class="vs">vs</span>
                <span class="enemy-team">??</span>
            </div>
            <div class="score win">?:?</div>
        </div>

        <!-- Пример матча 2 -->
        <div class="match-item">
            <div class="teams-box">
                <span class="our-team">TCK</span>
                <span class="vs">vs</span>
                <span class="enemy-team">??</span>
            </div>
            <div class="score lose">?:?</div>
        </div>
    </div>

    <!-- Кнопка с переводом -->
    <a href="../" class="back-btn" data-lang="backBtn">← Back to Main</a>

    <script>
        window.onload = function() {
            if (typeof updateLanguage === 'function') {
                updateLanguage();
            }
        };
    </script>
</body>
</html>
