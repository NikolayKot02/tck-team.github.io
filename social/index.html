<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCK Team | Follow Us</title>
	
	<meta name="description" content="Follow TCK Team on social media: Twitch, YouTube, Discord, and TikTok.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nikolaykot02.github.io/tck-team/Logowebsite.png"> <!-- ЗАМЕНИТЕ НА СВОЮ ССЫЛКУ -->
    <meta property="og:title" content="TCK Team | Social media">
    <meta property="og:description" content="TCK Team social network">
    <meta property="og:image" content="https://nikolaykot02.github.io/tck-team/Logowebsite.png"> <!-- ПОЛНАЯ ССЫЛКА НА ЛОГО -->

    <!-- Twitter / Discord Large Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://nikolaykot02.github.io/tck-team/Logowebsite.png">
	
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="../Logo_TCK.png">

    <!-- Подключаем твой скрипт перевода -->
    <script src="../lang.js"></script>

    <style>
        body, html { height: 100%; margin: 0; background-color: #000; overflow-x: hidden; }
        body { color: white; font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; position: relative; padding: 20px; box-sizing: border-box; }

        /* ЗАГОЛОВОК СВЕРХУ СЛЕВА */
        /* ЗАГОЛОВОК */
        .header {
            position: absolute; top: 40px; left: 40px;
            color: #FF0000; font-size: 48px; text-transform: uppercase;
            font-weight: 900; letter-spacing: 2px; margin: 0;
        }

        .social-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 1px; background-color: #1a1a1a; border: 1px solid #1a1a1a;
            width: 100%; max-width: 900px; z-index: 1;
        }

        .social-item {
            background-color: #000; padding: 60px 40px;
            text-decoration: none; color: white;
            display: flex; flex-direction: column; transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-label { font-size: 15px; color: #72dbd4; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .social-name { font-size: 24px; font-weight: 900; text-transform: uppercase; }

        /* Эффекты наведения */
        .twitch:hover { background-color: rgba(145, 70, 255, 0.2); }
        .twitch:hover .social-name { color: #9146ff; }
        .youtube:hover { background-color: rgba(255, 0, 0, 0.2); }
        .youtube:hover .social-name { color: #ff0000; }
        .discord:hover { background-color: rgba(114, 137, 218, 0.2); }
        .discord:hover .social-name { color: #7289da; }
        .tiktok:hover { background-color: rgba(37, 244, 238, 0.2); }
        .tiktok:hover .social-name { color: #25f4ee; }

        /* Кнопка ВЫХОД (десктоп) */
        .social-name { font-size: 24px; font-weight: 900; text-transform: uppercase; transition: 0.3s; z-index: 3; }

        /* ОБЩИЙ СТИЛЬ ЛИНИИ (по умолчанию слева направо) */
        .social-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 4px;
            transition: width 0.4s ease-out;
            z-index: 2;
        }

        /* СПЕЦИАЛЬНО ДЛЯ YOUTUBE И TIKTOK (справа налево) */
        .youtube::after, .tiktok::after {
            left: auto;
            right: 0;
        }

        .social-item:hover::after {
            width: 100%;
        }

        /* ЦВЕТА И ЭФФЕКТЫ ПРИ НАВЕДЕНИИ */
        /* Twitch */
        .twitch:hover { background-color: rgba(145, 70, 255, 0.1); }
        .twitch:hover .social-name { color: #9146ff; text-shadow: 0 0 15px rgba(145, 70, 255, 0.6); }
        .twitch::after { background: #9146ff; box-shadow: 0 0 15px #9146ff; }

        /* YouTube (Справа налево) */
        .youtube:hover { background-color: rgba(255, 0, 0, 0.1); }
        .youtube:hover .social-name { color: #ff0000; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
        .youtube::after { background: #ff0000; box-shadow: 0 0 15px #ff0000; }

        /* Discord */
        .discord:hover { background-color: rgba(114, 137, 218, 0.1); }
        .discord:hover .social-name { color: #7289da; text-shadow: 0 0 15px rgba(114, 137, 218, 0.6); }
        .discord::after { background: #7289da; box-shadow: 0 0 15px #7289da; }

        /* TikTok (Справа налево) */
        .tiktok:hover { background-color: rgba(37, 244, 238, 0.1); }
        .tiktok:hover .social-name { color: #25f4ee; text-shadow: 0 0 15px rgba(37, 244, 238, 0.6); }
        .tiktok::after { background: #25f4ee; box-shadow: 0 0 15px #25f4ee; }

        /* Кнопка назад */
        .back-btn {
            position: fixed; bottom: 40px; left: 40px;
            color: #333; text-decoration: none; border: 1px solid #222;
            padding: 10px 30px; text-transform: uppercase;
            font-size: 12px; transition: 0.3s; background: #000; z-index: 10;
        }
        .back-btn:hover { color: #FF0000; border-color: #FF0000; }
        .back-btn:hover { color: #FF0000; border-color: #FF0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }

        /* АДАПТАЦИЯ ПОД ТЕЛЕФОНЫ */
        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            body { 
                flex-direction: column; 
                justify-content: flex-start; 
                padding-top: 100px; 
                padding-bottom: 100px; /* Чтобы контент не перекрывался кнопкой */
                overflow-y: auto; 
            }
            .header { 
                position: static; 
                margin-bottom: 30px; 
                font-size: 32px; 
                text-align: center; 
                width: 100%; 
            }
            body { flex-direction: column; justify-content: flex-start; padding-top: 100px; padding-bottom: 100px; overflow-y: auto; }
            .header { position: static; margin-bottom: 30px; font-size: 32px; text-align: center; width: 100%; }
            .social-grid { grid-template-columns: 1fr; width: 100%; }
            .social-item { padding: 40px 20px; text-align: center; }
            
            /* ФИКС: Кнопка на мобилках всегда снизу */
            .back-btn { 
                position: fixed; 
                bottom: 15px; 
                left: 15px; 
                right: 15px; 
                text-align: center;
                background: rgba(10, 10, 10, 0.95); 
                backdrop-filter: blur(5px);
                border: 1px solid #333;
                padding: 15px; 
                font-size: 14px;
                color: #888;
                border-radius: 4px;
            }
            /* На мобилках все линии можно сделать слева направо для единства */
            .social-item::after { left: 0 !important; right: auto !important; }
            .back-btn { position: fixed; bottom: 15px; left: 15px; right: 15px; text-align: center; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(5px); border: 1px solid #333; padding: 15px; font-size: 14px; color: #888; border-radius: 4px; }
        }
    </style>
</head>
<body>

    <div class="header" data-lang="followTitle">FOLLOW US</div>

    <div class="social-grid">
        <!-- Twitch (Слева направо) -->
        <a href="https://www.twitch.tv/tck_team_cs2" target="_blank" class="social-item twitch">
            <span class="social-label" data-lang="twitchLabel">Twitch</span>
            <span class="social-name">@TCK_TEAM</span>
        </a>
        <!-- YouTube (Справа налево) -->
        <a href="http://www.youtube.com/@TCKteam" target="_blank" class="social-item youtube">
            <span class="social-label" data-lang="ytLabel">YouTube</span>
            <span class="social-name">TCK TEAM TV</span>
        </a>
        <!-- Discord (Слева направо) -->
        <a href="https://discord.gg/VWakF87jZ2" target="_blank" class="social-item discord">
            <span class="social-label" data-lang="dsLabel">Discord</span>
            <span class="social-name">TCK Team</span>
        </a>
        <!-- TikTok (Справа налево) -->
        <a href="https://www.tiktok.com/@tck_team_cs" target="_blank" class="social-item tiktok">
            <span class="social-label" data-lang="ttLabel">TikTok</span>
            <span class="social-name">@tck_team_cs</span>
        </a>
    </div>

    <!-- Кнопка назад -->
    <a href="../" class="back-btn" data-lang="backBtn">← Back to Main</a>

    <script>
        window.onload = function() {
            if (typeof updateLanguage === 'function') {
                updateLanguage();
            }
        };
    </script>
</body>
</html>
